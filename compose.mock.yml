services:
  db:
    extends:
      file: compose.base.yml
      service: db
  redis:
    extends:
      file: compose.base.yml
      service: redis
  minio:
    extends:
      file: compose.base.yml
      service: minio
  api:
    extends:
      file: compose.base.yml
      service: api
    image: find-backend:mock
    build:
      args:
        FIND_BUILD_PROFILE: mock
        UV_SYNC_EXTRAS: "--extra mock"
    environment:
      FIND_BUILD_PROFILE: mock
      ML_MODE: mock
      AI_ENABLED: "${AI_ENABLED:-true}"
      ACCEL_MODE: cpu
      USE_GPU: "false"
  worker:
    extends:
      file: compose.base.yml
      service: worker
    image: find-backend:mock
    build:
      args:
        FIND_BUILD_PROFILE: mock
        UV_SYNC_EXTRAS: "--extra mock"
    environment:
      FIND_BUILD_PROFILE: mock
      ML_MODE: mock
      AI_ENABLED: "${AI_ENABLED:-true}"
      ACCEL_MODE: cpu
      USE_GPU: "false"
  web:
    extends:
      file: compose.base.yml
      service: web

volumes:
  db_data:
  redis_data:
  minio_data:
