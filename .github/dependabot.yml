version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: canary
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Kolkata
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /backend
    target-branch: canary
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Kolkata
    groups:
      python-runtime:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    target-branch: canary
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Asia/Kolkata
    groups:
      frontend-runtime:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /frontend/src-tauri
    target-branch: canary
    schedule:
      interval: monthly
    groups:
      desktop-runtime:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /backend
    target-branch: canary
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /frontend
    target-branch: canary
    schedule:
      interval: monthly
